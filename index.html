<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Odds</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="form_Names_Div">
    <h3 id="register_Form_Name">Register</h3>
    <h3 id="login_Form_Name">Login</h3>
</div>
<div id="form_Div">

    <!-- Registration form -->
<div id="register_Div">
    <form name="Registration">
        <label for="name" class="labels">Name : </label>
        <input type="text" id="name" required /><br /><br />

        <label for="username" class="labels">Username : </label>
        <input type="text" id="username" required placeholder="abc_123" /><br /><br />

        <label for="password" class="labels">Password : </label>
        <input type="password" id="password" required title="minimum 6 characters" minlength="6" /><br /><br />

        <button type="submit" id="r_btn">Register</button>
    </form>
</div>

<div id="login_Div">
            <div id="login-error-msg" style="display: none; margin-bottom: 15px;"></div>

    <!-- Login Form -->
    <form name="login">
         
        <label for="Lusername" class="login_labels">Username : </label>
        <input type="text" id="Lusername" required /><br /><br />

        <label for="Lpassword" class="login_labels">Password : </label>
        <input type="password" id="Lpassword" required /><br /><br />

        <button type="submit" id="l_btn">Login</button>
        </form>
    </div>

</div>
    <script src="script.js"></script>
</body>
</html>
