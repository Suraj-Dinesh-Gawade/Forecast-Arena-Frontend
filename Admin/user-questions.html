<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions</title>
    <link rel="stylesheet" href="userLayout.css" />
    <link rel="stylesheet" href="user-questions.css" />
</head>
<body>
    <div id="container">

    <div id="sidebar">

        <div id="logo">
            <h2>Forecast Arena</h2>
        </div>

        <nav id="menu">
            <a href="user-dashboard.html">Dashboard</a>

            <a href="user-questions.html" class="active">Questions</a>

            <a href="user-mybets.html">My Bets</a>

            <a href="user-leaderboard.html">Leaderboard</a>

            <a href="user-profile.html">Profile</a>
        </nav>

        <div id="logout-section">
            <button id="logout-btn">Logout</button>
        </div>

    </div>

    <div id="main-content">
        <h1>Questions</h1>

    <p id="question-subtitle">
        Find active questions and place your predictions.
    </p>
    <div id="search-container">
    <input type="text" placeholder="Search questions...">
</div>

<h2 class="section-title">🔥 Live Questions</h2>

<div class="question-card">

    <span class="category sports">Sports</span>

<h3 id="live_Question">Will Team India win today's match?</h3>

<div class="question-info">

    <span>⏳ 2h 14m Left</span>

</div>

<div class="odds-container">

    <div class="yes-box choice-box">
        YES
        <span>1.8x</span>
    </div>

    <div class="no-box choice-box">
        NO
        <span>2.2x</span>
    </div>

</div>

<div class="bet-section">

    <input type="number" placeholder="Enter Coins">

    <button class="bet-btn">
        Place Bet
    </button>

</div>

</div>
    </div>

</div>
<script src="user-question.js"></script>
</body>
</html>
